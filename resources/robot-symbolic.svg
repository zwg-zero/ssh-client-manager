<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Antenna -->
  <line x1="8" y1="0.5" x2="8" y2="2.5" stroke="#bebebe" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Head -->
  <rect x="3" y="2.5" width="10" height="6" rx="2" ry="2" fill="#bebebe"/>
  <!-- Eyes (cutout) -->

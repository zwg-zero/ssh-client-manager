  <circle cx="10.2" cy="5.5" r="1" fill="#000"/>
  <!-- Body -->
  <rect x="4" y="9.5" width="8" height="5" rx="1" ry="1" fill="#bebebe"/>
  <!-- Arms -->
  <rect x="1" y="10" width="2" height="3.5" rx="1" ry="1" fill="#bebebe"/>
  <rect x="13" y="10" width="2" height="3.5" rx="1" ry="1" fill="#bebebe"/>
</svg>
